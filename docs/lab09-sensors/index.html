<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab09 - Arm Workout App</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 5px;
      font-weight: 600;
    }

    h2 {
      font-weight: 300;
      color: #94a3b8;
      margin-top: 0;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 30px;
      margin-top: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    img {
      width: 100%;
      max-width: 500px;
      border-radius: 15px;
      margin-top: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      margin-top: 15px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 30px;
      border-radius: 30px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-3px);
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Lab09 - Arm Workout App</h1>
    <h2>663380609-1 พิษณุวัชร์ หงส์วิไล</h2>

    <div class="card">
      <h3>📱 ตัวอย่างหน้าจอแอป</h3>
      <img src="lab9-result.png" alt="App Screenshot">
    </div>

    <div class="card">
      <h3>🎥 วิดีโอสาธิตการทำงาน</h3>

      <div class="video-wrapper">
        <iframe 
          src="https://drive.google.com/file/d/1ZCVwphda4ktqSwroQBy8jG77zxTVvmli/preview"
          allow="autoplay">
        </iframe>
      </div>
    </div>

    <a class="btn" href="https://dodelido.github.io/mobileweb2/" target="_blank">
      🔗 ดู Source Code บน GitHub
    </a>

    <footer>
      Mobile Web Application Development | Ionic + Capacitor | 2026
    </footer>
  </div>
